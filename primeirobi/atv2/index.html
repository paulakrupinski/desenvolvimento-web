<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atv2</title>
</head>
<body>

<h1>CADASTRO DE USUÁRIO</h1>

<form>
    <fieldset>
        <legend>Crie sua conta</legend>

        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" name="nome" required><br><br>

        <label for="email">E-mail:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="senha">Senha (Mínimo 8 caracteres):</label><br>
        <input type="password" id="senha" name="senha" minlength="8" required><br><br>

        <b>Gênero</b><br><br>

        <input type="radio" id="masculino" name="genero" value="masculino" required>
        <label for="masculino">Masculino</label><br><br>

        <input type="radio" id="feminino" name="genero" value="feminino">
        <label for="feminino">Feminino</label><br><br>

        <label for="bio">Biografia:</label><br>
        <textarea id="bio" name="bio" rows="4" placeholder="Fale um pouco sobre você..."></textarea><br><br>

        <input type="checkbox" id="termos" name="termos" required>
        <label for="termos">Eu li e aceito os termos de serviço</label><br><br>

        <button type="submit">Criar Conta</button>

    </fieldset>
</form>

</body>
</html>
